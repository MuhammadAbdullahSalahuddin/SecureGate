networks:
  guardian-net:
    driver: bridge

services:
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    depends_on: [postgres, mongo, redis]
    networks: [guardian-net]
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:16
    restart: unless-stopped
    container_name: securegate_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: securegate

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/seed.sql:/docker-entrypoint-initdb.d/seed.sql

    networks: [guardian-net]

  mongo:
    image: mongo:latest
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: securegate_audit
    volumes:
      - mongodata:/data/db
    networks: [guardian-net]

  redis:
    image: redis:7
    restart: unless-stopped
    container_name: securegate_redis
    command: redis-server --requirepass admin
    networks: [guardian-net]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  mongodata:
  redisdata:
